<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Demo</title>
    <style>
        body {
            background-color: #0d0f14;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .liquid-glass-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
        }
        .glass-layers {
            position: relative;
            transition: all ease-out 0.2s;
        }
        .glass-main {
            position: relative;
            display: inline-flex;
            align-items: center;
            border-radius: var(--glass-radius, 999px);
            overflow: hidden;
            transition: all 0.2s ease-in-out;
            box-shadow: 0px 12px 40px rgba(0, 0, 0, 0.45);
        }
        .glass-backdrop {
            position: absolute;
            inset: 0;
        }
        .glass-content {
            position: relative;
            z-index: 1;
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
            padding: 24px 38px;
            text-shadow: 0px 2px 12px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.05em;
        }
        .glass-border {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: var(--glass-radius, 999px);
            pointer-events: none;
            padding: 1.5px;
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.6) inset, 0 1px 3px rgba(255, 255, 255, 0.4) inset, 0 1px 4px rgba(0, 0, 0, 0.5);
        }
        .border-1 {
            mix-blend-mode: screen;
            opacity: 0.25;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.12) 33%, rgba(255,255,255,0.4) 66%, transparent 100%);
        }
        .border-2 {
            mix-blend-mode: overlay;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.32) 33%, rgba(255,255,255,0.6) 66%, transparent 100%);
        }

        .glass-hover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 1px);
            height: 100%;
            border-radius: var(--glass-radius, 999px);
            pointer-events: none;
            transition: all 0.2s ease-out;
            mix-blend-mode: overlay;
            opacity: 0;
        }
        .hover-1 { background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 50%); }
        .hover-2 { background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 80%); }
        .hover-3 { background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 100%); }

        .liquid-glass-container.is-hovered .hover-1 { opacity: 0.6; }
        .liquid-glass-container.is-active .hover-1 { opacity: 0.6; }
        .liquid-glass-container.is-active .hover-2 { opacity: 0.6; }
        .liquid-glass-container.is-hovered .hover-3 { opacity: 0.5; }
        .liquid-glass-container.is-active .hover-3 { opacity: 0.9; }

        .demo-background {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1e29 0%, #0d0f14 100%);
        }
        .demo-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at 50% 50%, rgba(120, 0, 255, 0.2) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 8s infinite alternate;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); }
            100% { transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="demo-background">
        <div class="demo-orb"></div>
    </div>

          <div class="glass-main">

            <div class="glass-content">

          <span class="glass-border border-2"></span>

    <script>
        class LiquidGlass extends HTMLElement {
          constructor() {
            super();
            this.elasticity = parseFloat(this.dataset.elasticity || "0.15");
            this.layers = this.querySelector('.glass-layers');
            this.border1 = this.querySelector('.border-1');
            this.border2 = this.querySelector('.border-2');
            
            this.isHovered = false;
            this.isActive = false;
            this.mouseX = 0;
            this.mouseY = 0;
            
            this.handleMouseMove = this.handleMouseMove.bind(this);
            this.handleMouseEnter = this.handleMouseEnter.bind(this);
            this.handleMouseLeave = this.handleMouseLeave.bind(this);
            this.handleMouseDown = this.handleMouseDown.bind(this);
            this.handleMouseUp = this.handleMouseUp.bind(this);
            
            if (navigator.userAgent.toLowerCase().includes("firefox")) {
              const backdrop = this.querySelector('.glass-backdrop');
              if (backdrop) backdrop.style.filter = 'none';
            }
          }
      
          connectedCallback() {
            window.addEventListener('mousemove', this.handleMouseMove);
            this.addEventListener('mouseenter', this.handleMouseEnter);
            this.addEventListener('mouseleave', this.handleMouseLeave);
            this.addEventListener('mousedown', this.handleMouseDown);
            window.addEventListener('mouseup', this.handleMouseUp);
          }
      
          disconnectedCallback() {
            window.removeEventListener('mousemove', this.handleMouseMove);
            this.removeEventListener('mouseenter', this.handleMouseEnter);
            this.removeEventListener('mouseleave', this.handleMouseLeave);
            this.removeEventListener('mousedown', this.handleMouseDown);
            window.removeEventListener('mouseup', this.handleMouseUp);
          }
      
          handleMouseEnter() {
            this.isHovered = true;
            this.classList.add('is-hovered');
            this.updateTransform();
          }
      
          handleMouseLeave() {
            this.isHovered = false;
            this.isActive = false;
            this.classList.remove('is-hovered', 'is-active');
            this.updateTransform();
          }
      
          handleMouseDown() {
            this.isActive = true;
            this.classList.add('is-active');
            this.updateTransform();
          }
      
          handleMouseUp() {
            this.isActive = false;
            this.classList.remove('is-active');
            this.updateTransform();
          }
      
          handleMouseMove(e) {
            this.mouseX = e.clientX;
            this.mouseY = e.clientY;
            this.updateTransform();
          }
      
          updateTransform() {
            if (!this.layers) return;
            
            const rect = this.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            const centerX = rect.left + w / 2;
            const centerY = rect.top + h / 2;
            const deltaX = this.mouseX - centerX;
            const deltaY = this.mouseY - centerY;
            
            const edgeDX = Math.max(0, Math.abs(deltaX) - w / 2);
            const edgeDY = Math.max(0, Math.abs(deltaY) - h / 2);
            const edgeDist = Math.sqrt(edgeDX * edgeDX + edgeDY * edgeDY);
            
            const activationZone = 200;
            let scaleX = 1;
            let scaleY = 1;
            let transX = 0;
            let transY = 0;
            
            let offsetX = ((this.mouseX - centerX) / w) * 100;
            let offsetY = ((this.mouseY - centerY) / h) * 100;
            
            if (edgeDist <= activationZone) {
              const fadeIn = 1 - (edgeDist / activationZone);
              const centerDist = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
              if (centerDist > 0) {
                const normX = deltaX / centerDist;
                const normY = deltaY / centerDist;
                const stretch = Math.min(centerDist / 300, 1) * this.elasticity * fadeIn;
                
                scaleX = 1 + Math.abs(normX) * stretch * 0.3 - Math.abs(normY) * stretch * 0.15;
                scaleY = 1 + Math.abs(normY) * stretch * 0.3 - Math.abs(normX) * stretch * 0.15;
              }
              transX = deltaX * this.elasticity * 0.1 * fadeIn;
              transY = deltaY * this.elasticity * 0.1 * fadeIn;
            }
            
            let transformStr = `translate(${transX}px, ${transY}px)`;
            if (this.isActive) {
              transformStr += ` scale(0.96)`;
            } else {
              transformStr += ` scale(${Math.max(0.8, scaleX)}, ${Math.max(0.8, scaleY)})`;
            }
            
            this.layers.style.transform = transformStr;
            
            if (this.border1 && this.border2) {
              const b1 = `linear-gradient(${135 + offsetX * 1.2}deg, rgba(255,255,255,0) 0%, rgba(255,255,255,${0.12 + Math.abs(offsetX)*0.008}) ${Math.max(10, 33 + offsetY*0.3)}%, rgba(255,255,255,${0.4 + Math.abs(offsetX)*0.012}) ${Math.min(90, 66 + offsetY*0.4)}%, rgba(255,255,255,0) 100%)`;
              const b2 = `linear-gradient(${135 + offsetX * 1.2}deg, rgba(255,255,255,0) 0%, rgba(255,255,255,${0.32 + Math.abs(offsetX)*0.008}) ${Math.max(10, 33 + offsetY*0.3)}%, rgba(255,255,255,${0.6 + Math.abs(offsetX)*0.012}) ${Math.min(90, 66 + offsetY*0.4)}%, rgba(255,255,255,0) 100%)`;
              this.border1.style.background = b1;
              this.border2.style.background = b2;
            }
          }
        }
      
        customElements.define('liquid-glass', LiquidGlass);
      </script>
</body>
